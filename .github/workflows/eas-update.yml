name: EAS Update

on:
  push:
    branches: [main]
    # Skip when only docs / workflow files change — no point publishing an OTA
    # update if the runtime bundle didn't change.
    paths-ignore:
      - '**.md'
      - '.github/**'
      - 'scripts/**'
      - 'eas.json'

  # Allow manual runs from the Actions tab
  workflow_dispatch:
    inputs:
      message:
        description: 'Update message (optional)'
        required: false
        default: ''

concurrency:
  group: eas-update-main
  cancel-in-progress: false

jobs:
  publish:
    name: Publish OTA update to production channel
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Publish update
        run: |
          MSG="${{ github.event.inputs.message }}"
          if [ -z "$MSG" ]; then
            MSG="${{ github.event.head_commit.message }}"
          fi
          npx eas update --branch production --message "$MSG" --non-interactive
